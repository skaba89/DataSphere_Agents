name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # ============================================================
  # Job 1: Lint & Type Check
  # ============================================================
  lint-and-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: npx tsc --noEmit

  # ============================================================
  # Job 2: Test
  # ============================================================
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint-and-type-check
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: datasphere_agents_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Push database schema
        run: npx prisma db push --skip-generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/datasphere_agents_test
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/datasphere_agents_test

      - name: Run tests
        run: npm test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/datasphere_agents_test
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/datasphere_agents_test
          JWT_SECRET: test-jwt-secret-for-ci-32-characters-long
          NEXTAUTH_SECRET: test-nextauth-secret-for-ci-32-char

      - name: Test coverage report
        if: always()
        run: npm run test:coverage
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/datasphere_agents_test
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/datasphere_agents_test
          JWT_SECRET: test-jwt-secret-for-ci-32-characters-long
          NEXTAUTH_SECRET: test-nextauth-secret-for-ci-32-char

  # ============================================================
  # Job 3: Build
  # ============================================================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-type-check
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build Next.js
        run: npm run build
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/datasphere_agents
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/datasphere_agents
          NEXTAUTH_SECRET: build-secret-for-next-auth-32chars-long
          JWT_SECRET: build-secret-for-jwt-32-characters-long

      - name: Verify build output
        run: |
          echo "📦 Build output verification"
          ls -la .next/
          echo "✅ Build successful"

  # ============================================================
  # Job 4: Security audit (optional)
  # ============================================================
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Check for known vulnerabilities
        run: npx better-npm-audit audit --level=high
        continue-on-error: true
