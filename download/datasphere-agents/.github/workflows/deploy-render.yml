name: Render Deploy & Migrate

on:
  push:
    branches: [main]
    paths:
      - 'prisma/**'
      - 'src/lib/db.ts'
      - 'src/lib/env.ts'
      - 'scripts/migrate.ts'
  workflow_dispatch:

jobs:
  migrate:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run Prisma Migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL || secrets.DATABASE_URL }}

      - name: Verify database schema
        run: npx prisma db execute --stdin <<'SQL'
          SELECT tablename FROM pg_tables WHERE schemaname = 'public' ORDER BY tablename;
        SQL
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL || secrets.DATABASE_URL }}

  trigger-render:
    name: Trigger Render Deploy
    runs-on: ubuntu-latest
    needs: migrate
    if: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
    steps:
      - name: Trigger Render Deploy Hook
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": true}')
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          
          echo "Render API Response: $BODY"
          echo "HTTP Status: $HTTP_CODE"
          
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "✅ Render deploy triggered successfully"
          else
            echo "⚠️  Render deploy hook returned HTTP $HTTP_CODE"
            exit 1
          fi

  notify:
    name: Post-Migration Notification
    runs-on: ubuntu-latest
    needs: [migrate]
    if: always()
    steps:
      - name: Migration result
        run: |
          echo "Migration ${{ job.status }}"
          echo "Timestamp: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
