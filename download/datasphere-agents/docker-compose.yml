version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: datasphere-agents-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: datasphere
      POSTGRES_PASSWORD: datasphere_dev
      POSTGRES_DB: datasphere_agents
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U datasphere -d datasphere_agents']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: datasphere-agents-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
